onboarding = false

[theme]
name = "terminal"

[keys]
prefix = "ctrl+space"
copy_mode = "prefix+y"
previous_tab = "prefix+["
next_tab = "prefix+]"
previous_workspace = "prefix+alt+k"
next_workspace = "prefix+alt+j"
previous_agent = "prefix+alt+["
next_agent = "prefix+alt+]"
focus_agent = "prefix+alt+1..9"

[ui]
show_agent_labels_on_pane_borders = true
hide_tab_bar_when_single_tab = true

[ui.sidebar.agents]
rows = [
  ["state_icon", "workspace", "tab"],
  ["agent", "state_text"],
]

[ui.toast]
delivery = "terminal"
delay_seconds = 1
