---
# Shared variables for all Proxmox hosts
# SOPS secrets file path (absolute — Ansible lookup plugins may run from different CWDs)
sops_secrets_file: "/home/ammar/.dotfiles/secrets/secrets.yaml"

# SOPS extract keys (include single quotes for shell safety)
nut_sops_password_key: "'[\"nut_monitor_password\"]'"
pve_exporter_sops_user_key: "'[\"pve_exporter_user\"]'"
pve_exporter_sops_token_name_key: "'[\"pve_exporter_token_name\"]'"
pve_exporter_sops_token_value_key: "'[\"pve_exporter_token_value\"]'"
