---
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: openbao
spec:
  provider:
    vault:
      server: "http://100.64.0.21:8200"
      path: "secret"
      version: "v2"
      auth:
        appRole:
          path: "approle"
          roleRef:
            name: openbao-approle
            namespace: external-secrets
            key: role-id
          secretRef:
            name: openbao-approle
            namespace: external-secrets
            key: secret-id
