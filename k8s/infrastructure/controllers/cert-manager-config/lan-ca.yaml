---
# Step 1: Bootstrap issuer - only used to create the root CA certificate
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned
spec:
  selfSigned: {}
---
# Step 2: Root CA certificate - signed by the selfsigned issuer
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: lan-ca
  namespace: cert-manager
spec:
  isCA: true
  commonName: "Homelab LAN CA"
  secretName: lan-ca-secret
  duration: 87600h # 10 years
  renewBefore: 8760h # 1 year
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: selfsigned
    kind: ClusterIssuer
    group: cert-manager.io
---
# Step 3: CA issuer - uses the root CA to sign .lan certificates
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: lan-ca
spec:
  ca:
    secretName: lan-ca-secret
