---
# Offsite volume backups to Backblaze B2 (issue #41). One RecurringJob
# targets all volumes in the "offsite" group — volumes are annotated with
# recurring-job-group.longhorn.io/offsite=enabled.
#
# Block-level incremental snapshots → Longhorn's S3 backup target
# (configured in the Longhorn HelmRelease). Concurrency=2 so at most
# two volumes back up simultaneously.

apiVersion: longhorn.io/v1beta2
kind: RecurringJob
metadata:
  name: offsite-backup
  namespace: longhorn-system
spec:
  task: backup
  cron: "0 2 * * *"
  retain: 7
  concurrency: 2
  groups:
    - offsite
