---
# FluxCD Kustomization for External Secrets Operator configuration
# Deploys: ClusterSecretStore + AppRole bootstrap secret
# This must run after ESO HelmRelease is installed (CRDs needed)
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: external-secrets-config
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./k8s/infrastructure/controllers/external-secrets-config
  prune: true
  dependsOn:
    - name: infrastructure
  decryption:
    provider: sops
    secretRef:
      name: sops-age
