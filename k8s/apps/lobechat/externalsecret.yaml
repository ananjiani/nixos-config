---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: lobechat-secrets
  namespace: lobechat
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: lobechat-secrets
    creationPolicy: Owner
  data:
    - secretKey: database-password
      remoteRef:
        key: k8s/lobechat
        property: database-password
    - secretKey: database-url
      remoteRef:
        key: k8s/lobechat
        property: database-url
    - secretKey: key-vaults-secret
      remoteRef:
        key: k8s/lobechat
        property: key-vaults-secret
    - secretKey: next-auth-secret
      remoteRef:
        key: k8s/lobechat
        property: next-auth-secret
    - secretKey: authentik-client-secret
      remoteRef:
        key: k8s/lobechat
        property: authentik-client-secret
    - secretKey: minio-root-password
      remoteRef:
        key: k8s/lobechat
        property: minio-root-password
    - secretKey: s3-access-key-id
      remoteRef:
        key: k8s/lobechat
        property: s3-access-key-id
    - secretKey: s3-secret-access-key
      remoteRef:
        key: k8s/lobechat
        property: s3-secret-access-key
    - secretKey: bifrost-api-key
      remoteRef:
        key: k8s/lobechat
        property: bifrost-api-key
