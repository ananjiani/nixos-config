---
# Headless service pointing at the rclone WebDAV server on theoden.
# Mirrors home-assistant/service.yaml + romm/service.yaml (off-cluster via
# manual Endpoints).
apiVersion: v1
kind: Service
metadata:
  name: retroarch-external
  namespace: retroarch-sync
spec:
  ports:
    - port: 8086
      targetPort: 8086
---
apiVersion: v1
kind: Endpoints
metadata:
  name: retroarch-external
  namespace: retroarch-sync
subsets:
  - addresses:
      - ip: 192.168.1.27
    ports:
      - port: 8086
