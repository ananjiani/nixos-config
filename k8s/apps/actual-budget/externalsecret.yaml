---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: actualbudget-openid-secret
  namespace: actual-budget
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: actualbudget-openid-secret
    creationPolicy: Owner
  data:
    - secretKey: clientId
      remoteRef:
        key: k8s/actual-budget
        property: client-id
    - secretKey: clientSecret
      remoteRef:
        key: k8s/actual-budget
        property: client-secret
