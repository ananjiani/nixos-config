---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: open-webui-secrets
  namespace: open-webui
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: open-webui-secrets
    creationPolicy: Owner
  data:
    - secretKey: secret-key
      remoteRef:
        key: k8s/open-webui
        property: secret-key
    - secretKey: openai-api-keys
      remoteRef:
        key: llm/keys
        property: deepseek-api-key
    - secretKey: tavily-api-key
      remoteRef:
        key: llm/keys
        property: tavily-api-key
    - secretKey: oauth_client_secret
      remoteRef:
        key: k8s/open-webui
        property: oauth_client_secret
