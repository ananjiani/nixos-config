---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: bifrost-secrets
  namespace: bifrost
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: bifrost-secrets
    creationPolicy: Owner
  data:
    - secretKey: encryption-key
      remoteRef:
        key: k8s/bifrost
        property: encryption-key
    - secretKey: deepseek-api-key
      remoteRef:
        key: k8s/bifrost
        property: deepseek-api-key
    - secretKey: zai-api-key
      remoteRef:
        key: k8s/bifrost
        property: zai-api-key
    - secretKey: cliproxy-api-key
      remoteRef:
        key: k8s/bifrost
        property: cliproxy-api-key
    - secretKey: default-virtual-key
      remoteRef:
        key: k8s/bifrost
        property: default-virtual-key
    - secretKey: admin-username
      remoteRef:
        key: k8s/bifrost
        property: admin-username
    - secretKey: admin-password
      remoteRef:
        key: k8s/bifrost
        property: admin-password
