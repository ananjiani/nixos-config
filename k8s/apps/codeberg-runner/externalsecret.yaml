---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: codeberg-runner
  namespace: codeberg-runner
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: codeberg-runner
    creationPolicy: Owner
  data:
    - secretKey: runner
      remoteRef:
        key: k8s/codeberg-runner
        property: runner
