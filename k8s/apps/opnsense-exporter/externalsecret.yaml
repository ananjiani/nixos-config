---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: opnsense-exporter-secret
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: opnsense-exporter-secret
    creationPolicy: Owner
  data:
    - secretKey: api-key
      remoteRef:
        key: k8s/opnsense-exporter
        property: api-key
    - secretKey: api-secret
      remoteRef:
        key: k8s/opnsense-exporter
        property: api-secret
