---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: persona-mcp-secrets
  namespace: persona-mcp
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: persona-mcp-secrets
    creationPolicy: Owner
  data:
    - secretKey: openai-api-key
      remoteRef:
        key: k8s/persona-mcp
        property: openai-api-key
