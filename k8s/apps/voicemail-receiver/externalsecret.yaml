---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: voicemail-secrets
  namespace: voicemail-receiver
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: voicemail-secrets
    creationPolicy: Owner
  data:
    - secretKey: WEBHOOK_BASE_URL
      remoteRef:
        key: k8s/voicemail-receiver
        property: WEBHOOK_BASE_URL
    - secretKey: TELNYX_API_KEY
      remoteRef:
        key: k8s/voicemail-receiver
        property: TELNYX_API_KEY
