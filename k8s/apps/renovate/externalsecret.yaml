---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: renovate-credentials
  namespace: renovate
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: renovate-credentials
    creationPolicy: Owner
  data:
    - secretKey: token
      remoteRef:
        key: k8s/renovate
        property: token
    - secretKey: github-token
      remoteRef:
        key: k8s/renovate
        property: github-token
