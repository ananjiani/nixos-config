---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: holmesgpt-ai-secret
  namespace: holmesgpt
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: holmesgpt-ai-secret
    creationPolicy: Owner
  data:
    - secretKey: api-key
      remoteRef:
        key: k8s/holmesgpt
        property: api-key
