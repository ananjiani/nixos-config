---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: holmesgpt-ai-secret
  namespace: holmesgpt
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: holmesgpt-ai-secret
    creationPolicy: Owner
  data:
    - secretKey: deepseek-api-key
      remoteRef:
        key: llm/keys
        property: deepseek-api-key
    - secretKey: zai-api-key
      remoteRef:
        key: llm/keys
        property: zai-api-key
    - secretKey: opencode-api-key
      remoteRef:
        key: llm/keys
        property: opencode-api-key
