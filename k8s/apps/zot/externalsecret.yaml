---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: zot-credentials
  namespace: zot
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: zot-credentials
    creationPolicy: Owner
  data:
    - secretKey: credentials.json
      remoteRef:
        key: k8s/zot
        property: credentials.json
