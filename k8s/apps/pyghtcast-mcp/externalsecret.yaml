---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: pyghtcast-mcp-secrets
  namespace: pyghtcast-mcp
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: pyghtcast-mcp-secrets
    creationPolicy: Owner
  data:
    - secretKey: lcapi-user
      remoteRef:
        key: k8s/pyghtcast-mcp
        property: lcapi-user
    - secretKey: lcapi-pass
      remoteRef:
        key: k8s/pyghtcast-mcp
        property: lcapi-pass
    - secretKey: api-keys
      remoteRef:
        key: k8s/pyghtcast-mcp
        property: api-keys
