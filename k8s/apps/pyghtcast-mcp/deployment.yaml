---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pyghtcast-mcp
  namespace: pyghtcast-mcp
  labels:
    app: pyghtcast-mcp
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: pyghtcast-mcp
  template:
    metadata:
      labels:
        app: pyghtcast-mcp
    spec:
      containers:
        - name: pyghtcast-mcp
          image: ghcr.io/dallas-college-lmic/pyghtcast-mcp:latest
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: LCAPI_USER
              valueFrom:
                secretKeyRef:
                  name: pyghtcast-mcp-secrets
                  key: lcapi-user
            - name: LCAPI_PASS
              valueFrom:
                secretKeyRef:
                  name: pyghtcast-mcp-secrets
                  key: lcapi-pass
            - name: PYGHTCAST_API_KEYS
              valueFrom:
                secretKeyRef:
                  name: pyghtcast-mcp-secrets
                  key: api-keys
            - name: PYGHTCAST_ALLOWED_HOSTS
              value: "pyghtcast-mcp.dimensiondoor.xyz"
          resources:
            requests:
              memory: "256Mi"
              cpu: "50m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
