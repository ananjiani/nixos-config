---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: searxng
  namespace: searxng
spec:
  interval: 1h
  chart:
    spec:
      chart: searxng
      version: "1.0.7"
      sourceRef:
        kind: HelmRepository
        name: kubitodev
        namespace: flux-system
      interval: 1h
  values:
    env:
      - name: SEARXNG_SECRET
        valueFrom:
          secretKeyRef:
            name: searxng-secret
            key: secret-key
    config:
      settings:
        enabled: true
        data: |-
          use_default_settings: true
          server:
            limiter: false
            image_proxy: true
            method: "GET"
          search:
            formats:
              - html
              - json
            default_lang: "en"

      limiter:
        enabled: true
        data: |-
          [botdetection.ip_limit]
          link_token = true
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "500m"
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: searxng
            patch: |
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: searxng
              spec:
                template:
                  spec:
                    enableServiceLinks: false
